<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#F6F1E8" />
  <title>melanie bossert</title>
  <meta name="description" content="A living surface. Touch it." />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Ccircle cx='8' cy='8' r='6' fill='%23E9C9F0'/%3E%3C/svg%3E" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter+Tight:wght@400;500&display=swap" rel="stylesheet" />

  <style>
    :root {
      --ink: #261A2E;
      --mute: #6A5972;
      --paper: #F6F1E8;
      --warm: #FFCFB0;
      --lilac: #E9C9F0;
      --sky:   #BFD3F2;
      --butter:#FFE9B5;
      --rose:  #F8C0CE;
    }

    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    html { -webkit-text-size-adjust: 100%; }

    body {
      min-height: 100dvh;
      min-height: 100vh;
      font-family: 'Inter Tight', system-ui, -apple-system, sans-serif;
      color: var(--ink);
      background: var(--paper);
      background-image:
        radial-gradient(ellipse 90vmax 70vmax at 20% 15%, rgba(255, 207, 176, 0.55), transparent 65%),
        radial-gradient(ellipse 80vmax 70vmax at 85% 90%, rgba(191, 211, 242, 0.45), transparent 65%);
      overflow: hidden;
      overscroll-behavior: none;
      touch-action: none;
      -webkit-font-smoothing: antialiased;
      -webkit-tap-highlight-color: transparent;
    }

    .page {
      position: relative;
      min-height: 100dvh;
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr auto;
      padding:
        max(1rem, env(safe-area-inset-top))
        max(1rem, env(safe-area-inset-right))
        max(1rem, env(safe-area-inset-bottom))
        max(1rem, env(safe-area-inset-left));
    }

    /* ─── periphery ─── */
    .top, .bottom {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.78rem;
      letter-spacing: 0.01em;
      color: var(--mute);
      z-index: 2;
    }
    .top { justify-content: flex-start; }
    .bottom { justify-content: flex-end; }

    .mark {
      font-family: 'Instrument Serif', serif;
      font-style: italic;
      font-size: 1.05rem;
      color: var(--ink);
      letter-spacing: -0.01em;
    }
    .mark .sep {
      display: inline-block;
      width: 0.4rem;
      height: 0.4rem;
      border-radius: 50%;
      background: var(--ink);
      margin: 0 0.5rem 0.1rem;
      vertical-align: middle;
    }

    .contact {
      font-family: 'Inter Tight', sans-serif;
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--ink);
      text-decoration: none;
      letter-spacing: -0.005em;
      display: inline-flex;
      align-items: center;
      gap: 0.25rem;
      padding: 0.35rem 0.6rem;
      border-radius: 999px;
      transition: background 0.18s ease;
    }
    .contact .arrow { transition: transform 0.18s ease; }
    .contact:hover, .contact:focus-visible {
      background: rgba(38, 26, 46, 0.06);
    }
    .contact:hover .arrow, .contact:focus-visible .arrow {
      transform: translate(2px, -2px);
    }
    .contact:focus-visible {
      outline: 2px solid var(--ink);
      outline-offset: 3px;
    }

    /* ─── stage ─── */
    .stage {
      position: relative;
      display: grid;
      place-items: center;
    }

    .blob-wrap {
      position: relative;
      width: min(86vw, 86vh, 720px);
      height: min(86vw, 86vh, 720px);
    }

    .blob {
      width: 100%;
      height: 100%;
      display: block;
      overflow: visible;
      filter: hue-rotate(var(--hue, 0deg)) saturate(1.05);
      transition: filter 0.6s linear;
      will-change: filter, transform;
      cursor: grab;
    }
    .blob:active { cursor: grabbing; }
    .blob.engaged path#blobPath {
      filter: drop-shadow(0 18px 70px rgba(38, 26, 46, 0.22));
    }
    .blob path#blobPath {
      will-change: d;
      transition: filter 0.3s ease;
    }

    .label {
      position: absolute;
      bottom: -1.6rem;
      left: 50%;
      transform: translateX(-50%);
      font-family: ui-monospace, 'SF Mono', Menlo, monospace;
      font-size: 0.72rem;
      letter-spacing: 0.08em;
      color: var(--mute);
      text-transform: lowercase;
      transition: opacity 0.5s ease, transform 0.5s ease;
      pointer-events: none;
      white-space: nowrap;
    }
    .label .dot {
      display: inline-block;
      width: 0.32rem;
      height: 0.32rem;
      border-radius: 50%;
      background: var(--ink);
      margin: 0 0.45rem 0.1rem;
      vertical-align: middle;
      animation: labelPulse 1.6s ease-in-out infinite;
    }
    @keyframes labelPulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%      { opacity: 0.35; transform: scale(0.85); }
    }
    .engaged .label {
      opacity: 0;
      transform: translateX(-50%) translateY(4px);
    }

    /* ─── ripple ─── */
    @keyframes ripple {
      0%   { r: 4;   stroke-opacity: 0.5; stroke-width: 2; }
      100% { r: 260; stroke-opacity: 0;   stroke-width: 0.5; }
    }
    .ripple-circle {
      fill: none;
      stroke: var(--ink);
      animation: ripple 0.95s cubic-bezier(.2,.65,.2,1) forwards;
      mix-blend-mode: multiply;
    }

    /* ─── desktop refinement ─── */
    @media (min-width: 768px) {
      .page {
        padding: max(1.5rem, env(safe-area-inset-top))
                 max(2rem, env(safe-area-inset-right))
                 max(1.5rem, env(safe-area-inset-bottom))
                 max(2rem, env(safe-area-inset-left));
      }
      .top, .bottom { font-size: 0.85rem; }
      .mark { font-size: 1.2rem; }
      .blob-wrap { width: min(70vmin, 760px); height: min(70vmin, 760px); }
      .label { font-size: 0.78rem; }
    }

    @media (prefers-reduced-motion: reduce) {
      .label .dot { animation: none; }
      .ripple-circle { animation: none; opacity: 0; }
    }

    /* ─── page-load reveal ─── */
    @keyframes rise {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .top    { animation: rise 0.7s 0.15s cubic-bezier(.2,.8,.2,1) both; }
    .stage  { animation: rise 1.0s 0.30s cubic-bezier(.2,.8,.2,1) both; }
    .bottom { animation: rise 0.7s 0.45s cubic-bezier(.2,.8,.2,1) both; }
    @media (prefers-reduced-motion: reduce) {
      .top, .stage, .bottom { animation: none; }
    }
  </style>
</head>
<body>
  <div class="page">
    <header class="top">
      <span class="mark"><em>m.</em><span class="sep"></span><em>bossert</em></span>
    </header>

    <section class="stage" id="stage">
      <div class="blob-wrap">
        <svg class="blob" id="blob" viewBox="-200 -200 400 400" role="img" aria-label="A soft interactive shape. Drag, press, or tap.">
          <defs>
            <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0%"   stop-color="var(--warm)"   />
              <stop offset="33%"  stop-color="var(--lilac)"  />
              <stop offset="66%"  stop-color="var(--sky)"    />
              <stop offset="100%" stop-color="var(--rose)"   />
            </linearGradient>
            <radialGradient id="touchGlow">
              <stop offset="0%"   stop-color="#261A2E" stop-opacity="0.55"/>
              <stop offset="55%"  stop-color="#261A2E" stop-opacity="0.14"/>
              <stop offset="100%" stop-color="#261A2E" stop-opacity="0"/>
            </radialGradient>
            <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
              <feGaussianBlur stdDeviation="0.4"/>
            </filter>
          </defs>
          <path id="blobPath" fill="url(#g)" filter="url(#soft)" />
          <g id="ripples"></g>
          <g id="indicators"></g>
        </svg>
        <span class="label" id="label"><span class="dot"></span>drag &middot; press</span>
      </div>
    </section>

    <footer class="bottom">
      <a class="contact" href="mailto:mnbossert@gmail.com">
        mnbossert@gmail.com<span class="arrow" aria-hidden="true">&nbsp;↗</span>
      </a>
    </footer>
  </div>

  <script>
    (() => {
      const svg = document.getElementById('blob');
      const path = document.getElementById('blobPath');
      const stage = document.getElementById('stage');
      const ripplesGroup = document.getElementById('ripples');
      const indicatorsGroup = document.getElementById('indicators');
      const reduce = matchMedia('(prefers-reduced-motion: reduce)').matches;
      const SVG_NS = 'http://www.w3.org/2000/svg';

      // ─── blob geometry ───
      const N = 32;
      const R = 150;
      const rest = [];
      const cur  = [];
      const vel  = [];
      for (let i = 0; i < N; i++) {
        const a = (i / N) * Math.PI * 2;
        rest.push({ x: Math.cos(a) * R, y: Math.sin(a) * R, a });
        cur.push({ x: Math.cos(a) * R, y: Math.sin(a) * R });
        vel.push({ vx: 0, vy: 0 });
      }

      // ─── physics constants (cranked up for visibility) ───
      const TENSION = 0.055;
      const DAMPING = 0.83;
      const NEIGH_PULL = 0.045;
      const TOUCH_RADIUS = 160;
      const TOUCH_PUSH = 48;

      // ─── state ───
      const pointers = new Map();             // id -> {x, y} in svg coords
      const indicatorEls = new Map();         // id -> SVGCircle
      let engaged = false;

      // ─── path builder ───
      function buildPath(points) {
        const n = points.length;
        let d = '';
        for (let i = 0; i < n; i++) {
          const p0 = points[(i - 1 + n) % n];
          const p1 = points[i];
          const p2 = points[(i + 1) % n];
          const p3 = points[(i + 2) % n];
          const t = 0.16;
          const c1x = p1.x + (p2.x - p0.x) * t;
          const c1y = p1.y + (p2.y - p0.y) * t;
          const c2x = p2.x - (p3.x - p1.x) * t;
          const c2y = p2.y - (p3.y - p1.y) * t;
          if (i === 0) d += `M${p1.x.toFixed(2)},${p1.y.toFixed(2)} `;
          d += `C${c1x.toFixed(2)},${c1y.toFixed(2)} ${c2x.toFixed(2)},${c2y.toFixed(2)} ${p2.x.toFixed(2)},${p2.y.toFixed(2)} `;
        }
        return d + 'Z';
      }

      // ─── ambient rest (breathing + wobble) ───
      function ambientRest(i, t) {
        const baseA = rest[i].a;
        const breathe = 1 + 0.022 * Math.sin(t * 0.6);
        const wobble  = 0.06 * Math.sin(t * 0.4 + baseA * 3);
        const r = R * (breathe + wobble);
        return { x: Math.cos(baseA) * r, y: Math.sin(baseA) * r };
      }

      // ─── coord helpers ───
      function clientToSvg(clientX, clientY) {
        const r = svg.getBoundingClientRect();
        return {
          x: ((clientX - r.left) / r.width) * 400 - 200,
          y: ((clientY - r.top)  / r.height) * 400 - 200,
        };
      }

      // ─── touch indicators (soft glow at each pointer) ───
      function updateIndicators() {
        for (const [id, el] of indicatorEls) {
          if (!pointers.has(id)) { el.remove(); indicatorEls.delete(id); }
        }
        for (const [id, p] of pointers) {
          if (id === 'demo') continue;          // demo is invisible
          let el = indicatorEls.get(id);
          if (!el) {
            el = document.createElementNS(SVG_NS, 'circle');
            el.setAttribute('r', '38');
            el.setAttribute('fill', 'url(#touchGlow)');
            el.setAttribute('pointer-events', 'none');
            indicatorsGroup.appendChild(el);
            indicatorEls.set(id, el);
          }
          el.setAttribute('cx', p.x.toFixed(1));
          el.setAttribute('cy', p.y.toFixed(1));
        }
      }

      // ─── ripple on tap ───
      function emitRipple(svgX, svgY) {
        const c = document.createElementNS(SVG_NS, 'circle');
        c.setAttribute('cx', svgX.toFixed(1));
        c.setAttribute('cy', svgY.toFixed(1));
        c.setAttribute('class', 'ripple-circle');
        ripplesGroup.appendChild(c);
        setTimeout(() => c.remove(), 1000);
      }

      // ─── main animation loop ───
      let t0 = performance.now();
      let hue = 0;
      let hueAccum = 0;

      function frame(now) {
        const t = (now - t0) / 1000;
        const dtMs = 16;

        // hue drift — faster when engaged
        hueAccum += (engaged ? 0.045 : 0.008) * dtMs;
        if (hueAccum >= 1) {
          hue = (hue + Math.floor(hueAccum)) % 360;
          hueAccum -= Math.floor(hueAccum);
          document.documentElement.style.setProperty('--hue', hue + 'deg');
        }

        const touches = [];
        for (const p of pointers.values()) touches.push(p);

        for (let i = 0; i < N; i++) {
          const target = ambientRest(i, t);
          const p = cur[i];
          const v = vel[i];

          v.vx += (target.x - p.x) * TENSION;
          v.vy += (target.y - p.y) * TENSION;

          const pl = cur[(i - 1 + N) % N];
          const pr = cur[(i + 1) % N];
          v.vx += ((pl.x + pr.x) * 0.5 - p.x) * NEIGH_PULL;
          v.vy += ((pl.y + pr.y) * 0.5 - p.y) * NEIGH_PULL;

          for (const t2 of touches) {
            const dx = p.x - t2.x;
            const dy = p.y - t2.y;
            const dist = Math.hypot(dx, dy) || 0.001;
            if (dist < TOUCH_RADIUS) {
              const f = (1 - dist / TOUCH_RADIUS) * TOUCH_PUSH;
              v.vx += (dx / dist) * f;
              v.vy += (dy / dist) * f;
            }
          }

          v.vx *= DAMPING;
          v.vy *= DAMPING;
          p.x += v.vx;
          p.y += v.vy;
        }

        path.setAttribute('d', buildPath(cur));
        updateIndicators();
        if (!reduce) requestAnimationFrame(frame);
      }
      requestAnimationFrame(frame);

      // ─── engagement state ───
      function setEngaged() {
        if (engaged) return;
        engaged = true;
        svg.classList.add('engaged');
        stage.classList.add('engaged');
      }

      // ─── pointer events ───
      svg.addEventListener('pointerdown', e => {
        svg.setPointerCapture(e.pointerId);
        const pt = clientToSvg(e.clientX, e.clientY);
        pointers.set(e.pointerId, pt);
        emitRipple(pt.x, pt.y);
        setEngaged();
      });

      svg.addEventListener('pointermove', e => {
        if (pointers.has(e.pointerId)) {
          pointers.set(e.pointerId, clientToSvg(e.clientX, e.clientY));
        }
      });

      function endPointer(e) {
        pointers.delete(e.pointerId);
        if (svg.hasPointerCapture && svg.hasPointerCapture(e.pointerId)) {
          try { svg.releasePointerCapture(e.pointerId); } catch (_) {}
        }
      }
      svg.addEventListener('pointerup', endPointer);
      svg.addEventListener('pointercancel', endPointer);
      svg.addEventListener('pointerleave', endPointer);

      // desktop hover: soft attract via 'hover' key (no engaged transition)
      if (matchMedia('(hover: hover)').matches) {
        svg.addEventListener('pointermove', e => {
          if (e.pointerType === 'mouse' && !pointers.has(e.pointerId)) {
            pointers.set('hover', clientToSvg(e.clientX, e.clientY));
          }
        });
        svg.addEventListener('pointerleave', () => pointers.delete('hover'));
      }

      // ─── self-demo: brief sweep on load so you immediately see the interaction ───
      function runDemo() {
        if (reduce || engaged) return;
        const start = performance.now() + 700;
        const duration = 1800;
        function step(now) {
          if (engaged) { pointers.delete('demo'); return; }
          if (now < start) { requestAnimationFrame(step); return; }
          const t = (now - start) / duration;
          if (t >= 1) {
            pointers.delete('demo');
            // tiny ripple as it lifts off so the user sees what just happened
            emitRipple(0, 0);
            return;
          }
          // sweep along a curved arc that visibly squishes the blob
          const ease = t * t * (3 - 2 * t);
          const angle = ease * Math.PI * 1.8 - Math.PI * 0.4;
          const radius = 95 + Math.sin(ease * Math.PI) * 35;
          pointers.set('demo', {
            x: Math.cos(angle) * radius,
            y: Math.sin(angle) * radius,
          });
          requestAnimationFrame(step);
        }
        requestAnimationFrame(step);
      }
      runDemo();
    })();
  </script>
</body>
</html>
