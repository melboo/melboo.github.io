<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>melanie bossert</title>
  <meta name="description" content="Portfolio of Melanie Bossert." />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Ctext y='13' font-size='14'%3E◍%3C/text%3E%3C/svg%3E" />
  <style>
    :root {
      --bg: #0b0b0c;
      --fg: #f2f2ef;
      --dim: #6b6b68;
      --accent: #c9ff3b;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      background: var(--bg);
      color: var(--fg);
      font-family: ui-sans-serif, -apple-system, "Inter", system-ui, sans-serif;
      font-feature-settings: "ss01", "cv11";
      display: grid;
      place-items: center;
      overflow: hidden;
      cursor: crosshair;
    }
    canvas {
      position: fixed; inset: 0;
      width: 100%; height: 100%;
      z-index: 0;
    }
    main {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 2rem;
      mix-blend-mode: difference;
    }
    h1 {
      font-size: clamp(3rem, 12vw, 9rem);
      font-weight: 500;
      letter-spacing: -0.04em;
      line-height: 0.95;
    }
    h1 span { color: var(--accent); font-style: italic; }
    p {
      margin-top: 1.25rem;
      color: var(--dim);
      font-size: clamp(0.9rem, 1.2vw, 1rem);
      letter-spacing: 0.02em;
    }
    .blink::after {
      content: "▌";
      margin-left: 0.15em;
      animation: blink 1s steps(2) infinite;
      color: var(--accent);
    }
    @keyframes blink { 50% { opacity: 0; } }
    footer {
      position: fixed;
      bottom: 1rem; left: 0; right: 0;
      text-align: center;
      font-size: 0.75rem;
      color: var(--dim);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      z-index: 2;
    }
  </style>
</head>
<body>
  <canvas id="c"></canvas>
  <main>
    <h1>melanie<br/><span>bossert</span></h1>
    <p class="blink">portfolio loading</p>
  </main>
  <footer>↑ move your mouse</footer>

  <script>
    const c = document.getElementById('c');
    const ctx = c.getContext('2d');
    let w, h, dpr;
    let mx = 0, my = 0;
    const dots = [];

    function resize() {
      dpr = Math.min(window.devicePixelRatio || 1, 2);
      w = c.width = window.innerWidth * dpr;
      h = c.height = window.innerHeight * dpr;
      c.style.width = window.innerWidth + 'px';
      c.style.height = window.innerHeight + 'px';
    }
    resize();
    window.addEventListener('resize', resize);

    const N = 80;
    for (let i = 0; i < N; i++) {
      dots.push({
        x: Math.random() * w,
        y: Math.random() * h,
        vx: (Math.random() - 0.5) * 0.3,
        vy: (Math.random() - 0.5) * 0.3,
      });
    }

    window.addEventListener('pointermove', e => {
      mx = e.clientX * dpr;
      my = e.clientY * dpr;
    });

    function tick() {
      ctx.fillStyle = 'rgba(11, 11, 12, 0.18)';
      ctx.fillRect(0, 0, w, h);

      for (const d of dots) {
        const dx = mx - d.x, dy = my - d.y;
        const dist = Math.hypot(dx, dy);
        if (dist < 220 * dpr) {
          const f = (220 * dpr - dist) / (220 * dpr) * 0.6;
          d.vx -= (dx / dist) * f;
          d.vy -= (dy / dist) * f;
        }
        d.vx *= 0.96; d.vy *= 0.96;
        d.x += d.vx; d.y += d.vy;
        if (d.x < 0) d.x = w; if (d.x > w) d.x = 0;
        if (d.y < 0) d.y = h; if (d.y > h) d.y = 0;
      }

      ctx.strokeStyle = 'rgba(201, 255, 59, 0.25)';
      ctx.lineWidth = dpr;
      for (let i = 0; i < N; i++) {
        for (let j = i + 1; j < N; j++) {
          const a = dots[i], b = dots[j];
          const dx = a.x - b.x, dy = a.y - b.y;
          const d = Math.hypot(dx, dy);
          if (d < 120 * dpr) {
            ctx.globalAlpha = 1 - d / (120 * dpr);
            ctx.beginPath();
            ctx.moveTo(a.x, a.y);
            ctx.lineTo(b.x, b.y);
            ctx.stroke();
          }
        }
      }
      ctx.globalAlpha = 1;

      ctx.fillStyle = '#f2f2ef';
      for (const d of dots) {
        ctx.beginPath();
        ctx.arc(d.x, d.y, 1.5 * dpr, 0, Math.PI * 2);
        ctx.fill();
      }

      requestAnimationFrame(tick);
    }
    tick();
  </script>
</body>
</html>
